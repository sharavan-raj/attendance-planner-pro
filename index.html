
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Planner Pro</title>
<style>
/* Keyframes for animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0; 
    background: #f0f4f8; 
}

.card { 
    background: white; 
    padding: 30px; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    width: 350px; 
    /* Trigger entrance animation */
    animation: fadeInUp 0.6s ease-out;
}

h2 { text-align: center; color: #333; margin-top: 0; }
label { display: block; margin-top: 15px; font-size: 14px; color: #666; font-weight: 600; }

input { 
    width: 100%; 
    padding: 12px; 
    margin-top: 5px; 
    border: 1px solid #ddd; 
    border-radius: 8px; 
    box-sizing: border-box; 
    font-size: 16px; 
    transition: all 0.3s ease; 
}

input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }

button { 
    width: 100%; 
    padding: 12px; 
    background: #007bff; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    margin-top: 25px; 
    cursor: pointer; 
    font-size: 16px; 
    font-weight: bold; 
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}

button:hover { background: #0056b3; transform: scale(1.02); }
button:active { transform: scale(0.98); }

.result-box { 
    margin-top: 25px; 
    padding: 15px; 
    border-radius: 10px; 
    background: #f8f9fa; 
    border-left: 5px solid #007bff; 
    /* Trigger pop-in animation when displayed */
    animation: popIn 0.4s ease-out;
}

.perc { font-size: 28px; color: #007bff; text-align: center; margin-bottom: 10px; font-weight: 800; }
.info { font-size: 15px; color: #444; line-height: 1.6; }
.highlight-red { color: #d9534f; font-weight: bold; }
.highlight-green { color: #28a745; font-weight: bold; }

.footer { position: fixed; bottom: 10px; right: 15px; font-size: 10px; color: #999; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="card">
    <h2>Attendance Planner</h2>

    <label>Total classes present:</label>
    <input type="number" id="present" placeholder="45">

    <label>Total classes :</label>
    <input type="number" id="total" placeholder="60">

    <label>Target percentage you want(%):</label>
    <input type="number" id="want" placeholder="75">

    <button onclick="calculate()">Calculate Status</button>

    <div id="result" class="result-box" style="display:none;">
        <div id="currentPerc" class="perc"></div>
        <div id="details" class="info"></div>
    </div>
</div>

<div class="footer">MADE BY SHARAVAN RAJ</div>

<script>
function calculate() {
    let present = parseFloat(document.getElementById('present').value);
    let total = parseFloat(document.getElementById('total').value);
    let want = parseFloat(document.getElementById('want').value);
    let resBox = document.getElementById('result');
    let details = document.getElementById('details');

    if (isNaN(present) || isNaN(total) || isNaN(want) || total <= 0) {
        alert("Please enter valid numbers!");
        return;
    }
    if (present > total) {
        alert("You can't attend more classes than have existed!");
        return;
    }
    if (want >= 100 || want <= 0) {
        alert("Target must be between 1 and 99%");
        return;
    }

    let currentResult = (present / total) * 100;
    
    // Reset animation if already visible
    resBox.style.display = "none";
    void resBox.offsetWidth; // Trigger reflow
    resBox.style.display = "block";
    
    document.getElementById('currentPerc').innerText = currentResult.toFixed(1) + "%";

    if (currentResult >= want) {
        let canMiss = Math.floor((100 * present / want) - total);
        details.innerHTML = `
            <span class="highlight-green">✅ Above Target!</span><br>
            You can safely miss <span class="highlight-green">${canMiss}</span> more classes while staying above ${want}%.
        `;
    } else {
        let needed = Math.ceil((want * total - 100 * present) / (100 - want));
        let days = (needed / 6).toFixed(1);
        details.innerHTML = `
            <span class="highlight-red">❌ Below Target!</span><br>
            📍 Classes needed: <span class="highlight-red">${needed}</span><br>
            📅 Estimated days: <span class="highlight-red">${days} days</span> (Calculated at 6 classes /day).
        `;
    }
}
</script>

</body>
</html>
